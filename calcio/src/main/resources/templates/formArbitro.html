<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Arbitro</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=3}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1>
    <i class="fa-solid fa-flag page-title-icon"></i>
    <span th:text="${arbitro.id == null} ? 'Inserisci un nuovo arbitro' : 'Modifica arbitro'"></span>
</h1>

<form th:action="${arbitro.id == null} ? @{/arbitri} : @{'/arbitri/' + ${arbitro.id}}"
      th:object="${arbitro}"
      method="post"
      enctype="multipart/form-data">

    <div>
        <label>Nome:</label>
        <input type="text" th:field="*{nome}">

        <p class="error"
           th:if="${#fields.hasErrors('nome')}"
           th:errors="*{nome}">
        </p>
    </div>

    <div>
        <label>Cognome:</label>
        <input type="text" th:field="*{cognome}">

        <p class="error"
           th:if="${#fields.hasErrors('cognome')}"
           th:errors="*{cognome}">
        </p>
    </div>

    <div>
        <label>Codice arbitrale:</label>
        <input type="text" th:field="*{codiceArbitrale}">

        <p class="error"
           th:if="${#fields.hasErrors('codiceArbitrale')}"
           th:errors="*{codiceArbitrale}">
        </p>
    </div>

    <div>
        <label>Foto arbitro:</label>
        <input type="file" name="fileFoto" accept="image/*">
    </div>

    <button type="submit">Salva</button>

</form>

</body>
</html>
