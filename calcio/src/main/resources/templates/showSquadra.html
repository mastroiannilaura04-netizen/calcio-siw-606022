<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dettaglio Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div th:replace="fragments/header :: navbar"></div>

    <div class="profile-header">
        <div class="profile-avatar"><i class="fa-solid fa-shield-halved"></i></div>
        <h1 th:text="${squadra.nome}" style="margin-top: 0;">Nome squadra</h1>
        <div style="font-size: 1.1rem; color: var(--text-muted); margin-top: 10px;">
            <span style="margin-right: 15px;"><i class="fa-solid fa-city"></i> <span th:text="${squadra.citta}">Città</span></span>
            <span><i class="fa-solid fa-calendar-days"></i> Fondata nel <span th:text="${squadra.annoFondazione}">1900</span></span>
        </div>
    </div>

    <div class="page-actions">
        <a th:href="@{'/squadre/' + ${squadra.id} + '/edit'}" class="btn-secondary">
            <i class="fa-solid fa-pencil"></i> Modifica squadra
        </a>
        <form th:action="@{'/squadre/' + ${squadra.id} + '/delete'}" method="post" style="display:inline; margin:0; padding:0; background:none; border:none; box-shadow:none;">
            <button type="submit" class="btn-danger" onclick="return confirm('Sei sicuro di voler eliminare questa squadra?');">
                <i class="fa-solid fa-trash"></i> Elimina squadra
            </button>
        </form>
    </div>

    <hr style="border: 0; height: 1px; background: rgba(4,41,58,0.08); max-width: 800px; margin: 40px auto;">

    <h2 class="text-center"><i class="fa-solid fa-users"></i> Giocatori della rosa</h2>

    <ul class="grid-container" style="max-width: 800px;">
        <li class="grid-card" th:each="giocatore : ${squadra.giocatori}" style="padding: 16px; margin: 0; border-radius: 12px; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 16px;">
            <div style="background: rgba(11,148,216,0.1); color: var(--accent-primary); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div style="text-align: left;">
                <div style="font-weight: 700; font-size: 1.1rem;">
                    <span th:text="${giocatore.nome}">Nome</span> <span th:text="${giocatore.cognome}">Cognome</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.9rem;" th:text="${giocatore.ruolo}">Ruolo</div>
            </div>
        </li>
        <li th:if="${squadra.giocatori.empty}" style="background: none; border: none; box-shadow: none; justify-content: center; width: 100%; color: var(--text-muted);">
            Nessun giocatore registrato per questa squadra.
        </li>
    </ul>

</body>
</html>
