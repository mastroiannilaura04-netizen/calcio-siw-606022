<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dettaglio Giocatore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<a th:href="@{/}" class="logo-link">
    <span class="logo-emoji">⚽</span>
</a>

<h1>👟 Dettaglio Giocatore</h1>

<div class="player-card">

    <div class="player-avatar">👤</div>

    <div class="player-main">
        <h2>
            <span th:text="${giocatore.nome}">Nome</span>
            <span th:text="${giocatore.cognome}">Cognome</span>
        </h2>

        <span class="player-role" th:text="${giocatore.ruolo}">Ruolo</span>
    </div>

</div>

<div class="details-grid">

    <div class="info-card">
        <h2>📋 Informazioni giocatore</h2>

        <p>
            <strong>🎂 Data di nascita:</strong>
            <span th:text="${giocatore.dataNascita}">Data</span>
        </p>

        <p>
            <strong>📏 Altezza:</strong>
            <span th:text="${giocatore.altezza}">Altezza</span>
        </p>

        <p>
            <strong>🛡️ Squadra:</strong>
            <span th:text="${giocatore.squadra.nome}">Squadra</span>
        </p>
    </div>

    <div class="info-card">
        <h2>⚡ Azioni rapide</h2>

        <a class="action-button blue"
           th:href="@{'/giocatori/' + ${giocatore.id} + '/edit'}">
            ✏️ Modifica giocatore
        </a>

        <a class="action-button gray" th:href="@{/giocatori}">
            ↩️ Torna ai giocatori
        </a>
    </div>

</div>

</body>
</html>
