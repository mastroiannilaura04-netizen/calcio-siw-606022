<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1 class="text-center">
    <i class="fa-solid fa-trophy"></i> Elenco Tornei
</h1>

<div class="page-actions">
    <a th:href="@{/tornei/new}" class="action-button blue">
        <i class="fa-solid fa-plus"></i> Aggiungi nuovo torneo
    </a>
</div>

<ul class="tournament-grid">

    <a th:each="torneo : ${tornei}"
       th:href="@{'/tornei/' + ${torneo.id}}"
       class="tournament-card">

        <div class="tournament-icon">🏆</div>

        <div class="tournament-content">
            <h2 th:text="${torneo.nome}">Nome Torneo</h2>

            <p>
                <i class="fa-solid fa-calendar-days"></i>
                Anno:
                <span th:text="${torneo.anno}">2026</span>
            </p>

            <p th:if="${torneo.descrizione != null}">
                <i class="fa-solid fa-align-left"></i>
                <span th:text="${torneo.descrizione}">Descrizione</span>
            </p>
        </div>

        <div class="tournament-button">
            Vedi torneo →
        </div>

    </a>

</ul>

</body>
</html>
