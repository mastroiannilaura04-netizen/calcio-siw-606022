<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/header :: navbar"></div>

    <h1 class="text-center"><i class="fa-solid fa-trophy text-muted"></i> Elenco Tornei</h1>

    <div class="page-actions">
        <a th:href="@{/tornei/new}" class="btn-secondary">
            <i class="fa-solid fa-plus"></i> Aggiungi nuovo torneo
        </a>
    </div>

    <ul class="grid-container">
        <a th:href="@{'/tornei/' + ${torneo.id}}" class="grid-card" th:each="torneo : ${tornei}">
            <div class="card-icon" style="color: #f1c40f;"><i class="fa-solid fa-trophy"></i></div>
            <h3 class="card-title" th:text="${torneo.nome}">Nome Torneo</h3>
            <p class="card-subtitle"><i class="fa-solid fa-calendar-days"></i> Anno: <span th:text="${torneo.anno}">Anno</span></p>
        </a>
    </ul>
</body>
</html>
