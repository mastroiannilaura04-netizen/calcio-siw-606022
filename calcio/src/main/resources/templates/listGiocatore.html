<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Giocatori</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div th:replace="fragments/header :: navbar"></div>

    <h1 class="text-center"><i class="fa-solid fa-users text-muted"></i> Elenco Giocatori</h1>

    <div class="page-actions">
        <a th:href="@{/giocatori/new}" class="btn-secondary">
            <i class="fa-solid fa-user-plus"></i> Aggiungi nuovo giocatore
        </a>
    </div>

    <ul class="grid-container">
        <a th:href="@{'/giocatori/' + ${giocatore.id}}" class="grid-card" th:each="giocatore : ${giocatori}" style="flex-direction: row; align-items: center; justify-content: flex-start; gap: 20px; text-align: left;">
            <div style="background: rgba(11,148,216,0.1); color: var(--accent-primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0;">
                <i class="fa-solid fa-user"></i>
            </div>
            <div>
                <div style="font-weight: 800; font-size: 1.2rem;">
                    <span th:text="${giocatore.nome}">Nome</span> <span th:text="${giocatore.cognome}">Cognome</span>
                </div>
                <div style="color: var(--text-muted); font-size: 0.95rem; margin-top: 4px;">
                    <i class="fa-solid fa-shield-halved"></i> <span th:text="${giocatore.squadra != null ? giocatore.squadra.nome : 'Nessuna squadra'}">Squadra</span>
                </div>
            </div>
        </a>
    </ul>

</body>
</html>
