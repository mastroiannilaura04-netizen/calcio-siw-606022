<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Giocatori</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1>👥 Elenco Giocatori</h1>

<a class="action-button blue" th:href="@{/giocatori/new}">
    ➕ Aggiungi nuovo giocatore
</a>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔎 Cerca giocatore per nome, cognome o squadra...">
</div>

<ul class="player-list" id="playerList">
    <li th:each="giocatore : ${giocatori}"
        class="player-list-item"
        th:attr="data-search=${giocatore.nome + ' ' + giocatore.cognome + ' ' + giocatore.squadra.nome}">

        <img th:if="${giocatore.foto != null}"
             th:src="@{${giocatore.foto}}"
             class="player-list-photo"
             alt="Foto giocatore">

        <div th:if="${giocatore.foto == null}" class="player-list-avatar">
            👤
        </div>

        <div>
            <a th:href="@{'/giocatori/' + ${giocatore.id}}">
                <strong>
                    <span th:text="${giocatore.nome}">Nome</span>
                    <span th:text="${giocatore.cognome}">Cognome</span>
                </strong>
            </a>

            <p>
                🛡️ <span th:text="${giocatore.squadra.nome}">Squadra</span>
            </p>
        </div>

    </li>
</ul>

<script>
    const searchInput = document.getElementById("searchInput");
    const players = document.querySelectorAll(".player-list-item");

    searchInput.addEventListener("input", function () {
        const value = this.value.toLowerCase();

        players.forEach(player => {
            const text = player.dataset.search.toLowerCase();

            if (text.includes(value)) {
                player.style.display = "flex";
            } else {
                player.style.display = "none";
            }
        });
    });
</script>

</body>
</html>
