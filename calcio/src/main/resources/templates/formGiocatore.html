<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuovo Giocatore</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1>👟 Inserisci un nuovo giocatore</h1>

<form th:action="${giocatore.id == null} ? @{/giocatori} : @{'/giocatori/' + ${giocatore.id}}"
      th:object="${giocatore}"
      method="post"
      enctype="multipart/form-data">

    <div>
        <label>Nome:</label>
        <input type="text" th:field="*{nome}">
        <div class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
    </div>

    <div>
        <label>Cognome:</label>
        <input type="text" th:field="*{cognome}">
        <div class="error" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></div>
    </div>

    <div>
        <label>Ruolo:</label>
        <input type="text" th:field="*{ruolo}">
        <div class="error" th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}"></div>
    </div>

    <div>
        <label>Data di nascita:</label>
        <input type="date" th:field="*{dataNascita}">
        <div class="error" th:if="${#fields.hasErrors('dataNascita')}" th:errors="*{dataNascita}"></div>
    </div>

    <div>
        <label>Altezza:</label>
        <input type="number" step="0.01" th:field="*{altezza}">
        <div class="error" th:if="${#fields.hasErrors('altezza')}" th:errors="*{altezza}"></div>
    </div>

    <div>
        <label>Squadra:</label>
        <select th:field="*{squadra}">
            <option value="">-- Seleziona squadra --</option>
            <option th:each="squadra : ${squadre}"
                    th:value="${squadra.id}"
                    th:text="${squadra.nome}">
            </option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('squadra')}" th:errors="*{squadra}"></div>
    </div>

    <div>
        <label>Foto giocatore:</label>
        <input type="file" name="fileFoto" accept="image/*">
    </div>

    <button type="submit">Salva</button>

</form>

</body>
</html>
