<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Giocatore</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=3}">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1>
    <i class="fa-solid fa-users page-title-icon"></i>
    <span th:text="${giocatore.id == null} ? 'Inserisci un nuovo giocatore' : 'Modifica giocatore'"></span>
</h1>

<form th:action="${giocatore.id == null} ? @{/giocatori} : @{'/giocatori/' + ${giocatore.id}}"
      th:object="${giocatore}"
      method="post"
      enctype="multipart/form-data">

    <label>Nome:</label>
    <input type="text" th:field="*{nome}">
    <p class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>

    <label>Cognome:</label>
    <input type="text" th:field="*{cognome}">
    <p class="error" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></p>

    <label>Ruolo:</label>
    <input type="text" th:field="*{ruolo}">
    <p class="error" th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}"></p>

    <label>Data di nascita:</label>
    <input type="date" th:field="*{dataNascita}">
    <p class="error" th:if="${#fields.hasErrors('dataNascita')}" th:errors="*{dataNascita}"></p>

    <label>Altezza:</label>
    <input type="number" step="0.01" th:field="*{altezza}">
    <p class="error" th:if="${#fields.hasErrors('altezza')}" th:errors="*{altezza}"></p>

    <label>Squadra:</label>
    <select th:field="*{squadra}">
        <option value="">-- Seleziona squadra --</option>
        <option th:each="squadra : ${squadre}"
                th:value="${squadra.id}"
                th:text="${squadra.nome}">
        </option>
    </select>
    <p class="error" th:if="${#fields.hasErrors('squadra')}" th:errors="*{squadra}"></p>

    <label>Foto giocatore:</label>
    <input type="file" name="fileFoto" accept="image/*">

    <button type="submit">Salva</button>

</form>

</body>
</html>
