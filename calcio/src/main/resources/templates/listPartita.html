<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Partite</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<h1 class="text-center">
    <i class="fa-solid fa-futbol"></i> Calendario Partite
</h1>

<div class="page-actions">
    <a th:href="@{/partite/new}" class="action-button blue">
        <i class="fa-solid fa-plus"></i> Aggiungi nuova partita
    </a>
</div>

<ul class="grid-container">

    <a th:each="partita : ${partite}"
       th:href="@{'/partite/' + ${partita.id}}"
       class="match-list-card">

        <div class="match-status">
            <span th:text="${partita.stato}">Programmata</span>
        </div>

        <div class="match-teams">

            <div class="team-name">
                <span th:text="${partita.homeTeam.nome}">Casa</span>
            </div>

            <div class="vs">VS</div>

            <div class="team-name">
                <span th:text="${partita.awayTeam.nome}">Ospite</span>
            </div>

        </div>

        <div class="match-info">

            <div>
                <i class="fa-solid fa-location-dot"></i>
                <span th:text="${partita.luogo}">Luogo</span>
            </div>

            <div th:if="${partita.arbitro != null}">
                <i class="fa-solid fa-flag"></i>
                <span th:text="${partita.arbitro.nome}">Nome</span>
                <span th:text="${partita.arbitro.cognome}">Cognome</span>
            </div>

        </div>

        <div class="match-button">
            Vedi dettagli →
        </div>

    </a>

</ul>

</body>
</html>
